<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Main</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="calculadora">
      <input type="text" id="visor" disabled />

      <table>
        <tr>
          <td><button onclick="digitar('7')">7</button></td>
          <td><button onclick="digitar('8')">8</button></td>
          <td><button onclick="digitar('9')">9</button></td>
          <td><button class="operador" onclick="digitar('/')">÷</button></td>
        </tr>
        <tr>
          <td><button onclick="digitar('4')">4</button></td>
          <td><button onclick="digitar('5')">5</button></td>
          <td><button onclick="digitar('6')">6</button></td>
          <td><button class="operador" onclick="digitar('*')">×</button></td>
        </tr>
        <tr>
          <td><button onclick="digitar('1')">1</button></td>
          <td><button onclick="digitar('2')">2</button></td>
          <td><button onclick="digitar('3')">3</button></td>
          <td><button class="operador" onclick="digitar('-')">−</button></td>
        </tr>
        <tr>
          <td><button onclick="digitar('0')">0</button></td>
          <td><button onclick="digitar('.')">.</button></td>
          <td><button class="igual" onclick="calcular()">=</button></td>
          <td><button class="operador" onclick="digitar('+')">+</button></td>
        </tr>
      </table>

      <button class="limpar" onclick="limpar()">LIMPAR</button>
    </div>

    <script src="script.js"></script>
  </body>
</html>
